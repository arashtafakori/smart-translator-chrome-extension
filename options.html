<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            width: 350px;
            color: #202124;
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #3c4043;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .setting-item {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #5f6368;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            background-color: #fff;
            color: #3c4043;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            background-color: #e6f4ea;
            color: #137333;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Translator Settings</h2>
    
    <div class="setting-item">
        <label for="default-source-lang">Default Source Language:</label>
        <select id="default-source-lang">
            <!-- Options will be populated by options.js -->
        </select>
    </div>

    <div class="setting-item">
        <label for="default-target-lang">Default Target Language:</label>
        <select id="default-target-lang">
            <!-- Options will be populated by options.js -->
        </select>
    </div>

    <div id="status" class="status">Settings saved!</div>
    <script src="options.js"></script>
</body>
</html>
