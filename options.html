<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            width: 350px;
            color: #202124;
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #3c4043;
            border-bottom: 1px solid #dadce0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .setting-item {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: #5f6368;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            background-color: #fff;
            color: #3c4043;
            cursor: pointer;
        }
        select:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }

        /* Searchable Dropdown Styles */
        .gt-searchable-select {
            position: relative;
            width: 100%;
        }

        .gt-search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .gt-options-list {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #dadce0;
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .gt-option-item {
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #3c4043;
        }

        .gt-option-item:hover {
            background-color: #f1f3f4;
        }

        .gt-option-item.selected {
            background-color: #e8f0fe;
            color: #1967d2;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            background-color: #e6f4ea;
            color: #137333;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Translator Settings</h2>
    
    <div class="setting-item">
        <label for="default-source-lang">Default Source Language:</label>
        <div class="gt-searchable-select" id="source-lang-container">
            <input type="text" class="gt-search-input" id="source-search" placeholder="Search language...">
            <div class="gt-options-list" id="source-options"></div>
        </div>
    </div>

    <div class="setting-item">
        <label for="default-target-lang">Default Target Language:</label>
        <div class="gt-searchable-select" id="target-lang-container">
            <input type="text" class="gt-search-input" id="target-search" placeholder="Search language...">
            <div class="gt-options-list" id="target-options"></div>
        </div>
    </div>

    <div id="status" class="status">Settings saved!</div>
    <script src="options.js"></script>
</body>
</html>
